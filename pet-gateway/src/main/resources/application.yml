server:
  port: 9000

spring:
  application:
    name: pet-gateway
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: pet-user-service
          uri: lb://pet-user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: pet-order-service
          uri: lb://pet-order-service
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
